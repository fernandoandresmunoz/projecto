services:
  karma-tests:
    image: vzor-front:latest
    volumes:
      - ./coverage:/app/coverage
      - ./junit-report:/app/junit-report
    command: >
      sh -c "
        mkdir -p coverage &&
        npm run test || true
      "


  karma-tests-develop:
    image: vzor-front-develop:latest
    volumes:
      - ./coverage:/app/coverage
      - ./junit-report:/app/junit-report
    command: >
      sh -c "
        mkdir -p coverage &&
        npm run test || true
      "

  build-test:
    image: vzor-front:latest
    volumes:
      - ./dist:/app/dist

    command: >
      sh -c "
        npm run build-staging
      "

  build-test-operaciones:
    image: vzor-front:latest
    volumes:
      - ./dist:/app/dist

    command: >
      sh -c "
        npm run build-operaciones
      "




