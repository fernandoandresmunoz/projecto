<p>pause-reset works!</p>
<div>
  <div>

    @if (automata.getPause()) {
      <span>pausado</span>
    }
  </div>

  <button (click)='automata.setPause(!automata.getPause())'> pause</button>

  <button (click)='automata.setGeneration(0); automata.setMatrizActiva(automata.createRandomMatriz()); '>reset</button>

</div>
